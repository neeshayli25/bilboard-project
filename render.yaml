services:
  - type: web
    name: cdbms-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: PUBLIC_APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM_NAME
        value: CDBMS Support
      - key: ALLOW_EMAIL_PREVIEW
        value: false
      - key: WEBAUTHN_RP_NAME
        value: CDBMS
      - key: WEBAUTHN_RP_ID
        sync: false
      - key: WEBAUTHN_ORIGIN
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_ORGANIZATION
        value: CDBMS
      - key: MAX_FILE_SIZE
        value: 52428800
